name: Sync MP Events

# Fetches upcoming events from Ministry Platform and uploads them to the
# church FTP server. Runs every 30 minutes (best-effort; UTC schedule).
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dotenv python-dateutil

      - name: Create ephemeral .env from secrets
        run: |
          {
            echo "CLIENT_ID=${{ secrets.CLIENT_ID }}"
            echo "CLIENT_SECRET=${{ secrets.CLIENT_SECRET }}"
            echo "TOKEN_URL=${{ secrets.TOKEN_URL }}"
            echo "FTP_HOST=${{ secrets.FTP_HOST }}"
            echo "FTP_USERNAME=${{ secrets.FTP_USERNAME }}"
            echo "FTP_PASSWORD=${{ secrets.FTP_PASSWORD }}"
            echo "BEARER_TOKEN="
            echo "TOKEN_EXPIRATION="
          } >> .env

      - name: Run event sync
        run: python mp_api_client/clientv2.py
